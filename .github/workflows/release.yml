name: Release Build

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - rid: win-x64
            platform: x64
          - rid: win-arm64
            platform: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore TalkTranscript.csproj

      - name: Build
        run: dotnet publish TalkTranscript.csproj -c Release -r ${{ matrix.rid }} -p:PlatformTarget=${{ matrix.platform }} --self-contained -o publish

      - name: Copy USAGE.md
        run: Copy-Item USAGE.md publish\USAGE.md

      - name: Create ZIP
        run: Compress-Archive -Path publish\* -DestinationPath TalkTranscript-${{ github.ref_name }}-${{ matrix.rid }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TalkTranscript-${{ matrix.rid }}
          path: TalkTranscript-${{ github.ref_name }}-${{ matrix.rid }}.zip

  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: artifacts/*.zip
          generate_release_notes: true
